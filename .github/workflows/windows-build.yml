name: Windows build

# Builds the Tauri app on a real Windows runner and uploads the installers.
# This is also the authoritative Windows compile check — the macOS dev machine
# can't cross-compile the WinRT/WebView2/Win32 paths (see docs/release.md).

on:
  push:
    # `main` + the active feature branch get a build on every push; tags cut a
    # release build. Prune/extend these branches as the project moves on.
    branches: [main, m2-input-pipeline]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# A newer push to the same ref supersedes an in-flight build.
concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust (stable, MSVC host)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          # Cargo project lives under src-tauri/.
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      # Builds the Svelte frontend (beforeBuildCommand) then the Rust binary and
      # the NSIS + WiX (MSI) bundles. WebView2 + the MSVC resource compiler are
      # preinstalled on windows-latest.
      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: emulstick-windows-installers
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
